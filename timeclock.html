<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Time Clock - Holliday's Lawn & Garden</title>
    <meta content="Employee time clock for Holliday Lawn & Garden" name="description"/>
    <link href="assets/css/main.min.css" rel="stylesheet"/>
    <link href="assets/css/admin-dashboard.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png"/>
    <link rel="manifest" href="manifest.json"/>
    <meta content="#2e7d32" name="theme-color"/>
    <style>
        body { padding-top: 80px; margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .page-wrap { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Clock card */
        .clock-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); padding: 2.5rem 2rem; text-align: center; margin-bottom: 2rem; }
        .staff-greeting { font-size: 1.1rem; color: #666; margin-bottom: 0.25rem; }
        .staff-name { font-size: 1.6rem; font-weight: 700; color: #2c5530; margin-bottom: 1.5rem; }
        .live-clock { font-size: 3.5rem; font-weight: 700; color: #2c5530; letter-spacing: 2px; margin-bottom: 0.25rem; font-variant-numeric: tabular-nums; }
        .live-date { font-size: 1rem; color: #888; margin-bottom: 2rem; }

        /* Status badge */
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem; border-radius: 20px; font-weight: 600; font-size: 0.95rem; margin-bottom: 2rem; }
        .status-out { background: #f3f4f6; color: #6b7280; }
        .status-in { background: #dcfce7; color: #16a34a; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot-in { background: #16a34a; animation: pulse 1.5s infinite; }
        .status-dot-out { background: #9ca3af; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Shift timer */
        .shift-timer { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .shift-timer.visible { display: block; }
        .shift-timer-label { font-size: 0.85rem; color: #16a34a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .shift-timer-value { font-size: 2rem; font-weight: 700; color: #15803d; font-variant-numeric: tabular-nums; }

        /* Buttons */
        .clock-btn { width: 100%; max-width: 320px; padding: 1.1rem; border-radius: 10px; border: none; font-size: 1.15rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem; transition: all 0.2s; }
        .btn-clock-in { background: #4caf50; color: #fff; }
        .btn-clock-in:hover { background: #388e3c; }
        .btn-clock-out { background: #ef5350; color: #fff; }
        .btn-clock-out:hover { background: #c62828; }
        .btn-disabled { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }

        /* History table */
        .history-card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.09); overflow: hidden; }
        .history-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
        .history-title { font-size: 1.1rem; font-weight: 700; color: #2c5530; margin: 0; }
        .period-selector { padding: 0.4rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.85rem 1.25rem; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
        .no-data { text-align: center; padding: 2.5rem; color: #9e9e9e; }

        /* Pay summary */
        .pay-summary { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 1.25rem 1.5rem; margin: 1rem 1.5rem 1.5rem; }
        .pay-summary-row { display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0; }
        .pay-summary-row.total { border-top: 1px solid #bbf7d0; margin-top: 0.5rem; padding-top: 0.75rem; font-weight: 700; font-size: 1.05rem; color: #15803d; }
        .pay-label { color: #555; }
        .pay-value { font-weight: 600; color: #2c5530; }

        .msg { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 500; display: none; }
        .msg-success { background: #e8f5e8; color: #2e7d32; }
        .msg-error { background: #ffebee; color: #c62828; }

        @media (max-width: 600px) { .live-clock { font-size: 2.5rem; } .clock-btn { max-width: 100%; } th, td { padding: 0.6rem 0.75rem; } }
    </style>
    <link rel="stylesheet" href="assets/css/mobile.css"/>
</head>
<body>
    <header class="admin-header">
        <div class="logo">
            <img src="assets/images/hollidays-logo.optimized-1280.png" alt="Holliday's Lawn & Garden"/>
            <span style="font-weight:700;color:#2c5530;">Staff Portal</span>
        </div>
        <nav class="admin-nav">
            <a href="staff-portal.html">&#8592; Staff Portal</a>
            <a href="timeclock.html" class="active">Full History</a>
            <button class="btn btn-danger" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </nav>
    </header>

    <div class="page-wrap">
        <div id="msg" class="msg"></div>

        <!-- Clock In/Out Card -->
        <div class="clock-card">
            <p class="staff-greeting">Welcome back,</p>
            <p class="staff-name" id="staffName">Loading...</p>

            <div class="live-clock" id="liveClock">--:--:--</div>
            <div class="live-date" id="liveDate"></div>

            <div class="status-badge status-out" id="statusBadge">
                <span class="status-dot status-dot-out" id="statusDot"></span>
                <span id="statusText">Clocked Out</span>
            </div>

            <div class="shift-timer" id="shiftTimer">
                <div class="shift-timer-label">Current Shift Duration</div>
                <div class="shift-timer-value" id="shiftDuration">0:00:00</div>
            </div>

            <button class="clock-btn btn-clock-in" id="clockBtn" onclick="handleClockAction()">
                <i class="fas fa-sign-in-alt" id="clockBtnIcon"></i>
                <span id="clockBtnText">Clock In</span>
            </button>
        </div>

        <!-- History -->
        <div class="history-card">
            <div class="history-header">
                <h2 class="history-title"><i class="fas fa-history"></i> My Time History</h2>
                <select class="period-selector" id="periodFilter" onchange="loadHistory()">
                    <option value="7">Last 7 days</option>
                    <option value="14">Last 14 days</option>
                    <option value="30">Last 30 days</option>
                </select>
            </div>

            <div class="pay-summary" id="paySummary" style="display:none;">
                <div class="pay-summary-row">
                    <span class="pay-label">Total Hours</span>
                    <span class="pay-value" id="summaryHours">0.00 hrs</span>
                </div>
                <div class="pay-summary-row">
                    <span class="pay-label">Hourly Rate</span>
                    <span class="pay-value" id="summaryRate">--</span>
                </div>
                <div class="pay-summary-row total">
                    <span>Estimated Pay</span>
                    <span id="summaryPay">--</span>
                </div>
            </div>

            <div id="historyBody">
                <div class="no-data"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/timeclock.js"></script>
</body>
</html>
